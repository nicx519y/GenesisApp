openapi: 3.0.3
info:
  title: AITown Chat WebSocket API
  description: |
    AITown 聊天室 WebSocket 接口文档

    ## 连接说明
    - 协议：WebSocket
    - 建联时自动创建 Session，踢掉该用户的旧连接
    - 需要通过心跳维持连接（建议每 2 秒发送一次）

    ## 消息流程
    1. 建立连接 → 创建 Session
    2. 发送 `join` 进入聊天室 → 收到 `joined`
    3. 发送 `send_message` 发送消息 → 收到 `ack` → 广播 `user_message`
    4. AI 处理完成后广播 `character_message` / `narrator_message`
    5. 发送 `leave` 离开聊天室 → 收到 `leaved`
    6. 发送 `heartbeat` 维持连接

  version: 1.0.0
  contact:
    name: AITown Team

servers:
  - url: ws://{host}:{port}/aitown-chat/ws
    description: WebSocket 服务地址
    variables:
      host:
        default: localhost
      port:
        default: "8082"

paths:
  /ws:
    get:
      summary: WebSocket 建立连接
      description: |
        建立 WebSocket 连接，建联时自动创建 Session。

        **连接 URL 示例：**
        ```
        ws://localhost:8082/aitown-chat/ws?world_id=world_123
        ```

        **请求头：**
        - Authorization: Bearer {token}

      operationId: websocketConnect
      tags:
        - WebSocket
      parameters:
        - name: world_id
          in: query
          required: true
          description: 世界实例ID
          schema:
            type: string
            example: world_123
        - name: Authorization
          in: header
          required: true
          description: 用户认证 Token
          schema:
            type: string
            example: Bearer user_token_001
      responses:
        '101':
          description: Switching Protocols - WebSocket 连接成功

x-websocket-messages:
  # ==================== 客户端发送的消息 ====================
  client-messages:
    join:
      summary: 加入聊天室
      description: 进入指定的聊天室地点
      message:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            enum: [join]
          ts:
            type: integer
            format: int64
            description: 时间戳（毫秒）
          payload:
            type: object
            required:
              - location_id
            properties:
              location_id:
                type: string
                description: 地点ID
                example: location_001
        example:
          type: join
          ts: 1748352000000
          payload:
            location_id: location_001

    send_message:
      summary: 发送消息
      description: 发送聊天消息到当前聊天室
      message:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            enum: [send_message]
          ts:
            type: integer
            format: int64
            description: 时间戳（毫秒）
          payload:
            type: object
            required:
              - text
            properties:
              text:
                type: string
                description: 消息内容
                example: 你好，今天天气怎么样？
              client_uuid:
                type: string
                description: 客户端消息UUID（幂等去重）
                example: client_uuid_001
        example:
          type: send_message
          ts: 1748352000000
          payload:
            text: 你好，今天天气怎么样？
            client_uuid: client_uuid_001

    heartbeat:
      summary: 心跳
      description: 发送心跳维持连接，建议每 5 秒发送一次
      message:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            enum: [heartbeat]
          ts:
            type: integer
            format: int64
            description: 时间戳（毫秒）
          payload:
            type: object
            description: 空 payload
        example:
          type: heartbeat
          ts: 1748352000000
          payload: {}

    leave:
      summary: 离开聊天室
      description: 离开当前聊天室，保持 WebSocket 连接
      message:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            enum: [leave]
          ts:
            type: integer
            format: int64
            description: 时间戳（毫秒）
          payload:
            type: object
            description: 空 payload
        example:
          type: leave
          ts: 1748352000000
          payload: {}

  # ==================== 服务端发送的消息 ====================
  server-messages:
    # ---------- 连接控制 ----------
    joined:
      summary: 加入成功
      description: 服务端确认用户已成功加入聊天室
      message:
        type: object
        properties:
          type:
            type: string
            enum: [joined]
          ts:
            type: integer
            format: int64
            description: 时间戳（毫秒）
          payload:
            $ref: '#/components/schemas/WSPayload'
        example:
          type: joined
          ts: 1748352000000
          payload:
            ts: 1748352000000
            world_id: world_123
            location_id: location_001
            session_id: session_abc123
            user_id: user_001
            code: 0
            code_msg: ok

    leaved:
      summary: 离开成功
      description: 服务端确认用户已离开聊天室
      message:
        type: object
        properties:
          type:
            type: string
            enum: [leaved]
          ts:
            type: integer
            format: int64
          payload:
            $ref: '#/components/schemas/WSPayload'
        example:
          type: leaved
          ts: 1748352000000
          payload:
            ts: 1748352000000
            world_id: world_123
            location_id: location_001
            session_id: session_abc123
            user_id: user_001
            code: 0
            code_msg: ok

    kicked:
      summary: 被踢下线
      description: 用户在新设备登录，当前连接被踢下线
      message:
        type: object
        properties:
          type:
            type: string
            enum: [kicked]
          ts:
            type: integer
            format: int64
          payload:
            $ref: '#/components/schemas/WSPayload'
        example:
          type: kicked
          ts: 1748352000000
          payload:
            ts: 1748352000000
            world_id: world_123
            location_id: location_001
            session_id: session_abc123
            user_id: user_001
            code: 1001
            code_msg: new_connection

    disconnected:
      summary: 连接断开
      description: WebSocket 连接已断开
      message:
        type: object
        properties:
          type:
            type: string
            enum: [disconnected]
          payload:
            type: object

    # ---------- 消息确认 ----------
    ack:
      summary: 消息确认
      description: 服务端确认收到用户消息
      message:
        type: object
        properties:
          type:
            type: string
            enum: [ack]
          ts:
            type: integer
            format: int64
          payload:
            allOf:
              - $ref: '#/components/schemas/WSPayload'
              - type: object
                properties:
                  message_id:
                    type: integer
                    format: int64
                    description: 消息ID
                  conversation_round_id:
                    type: integer
                    format: int64
                    description: 对话轮次ID
        example:
          type: ack
          ts: 1748352000000
          payload:
            ts: 1748352000000
            world_id: world_123
            location_id: location_001
            session_id: session_abc123
            user_id: user_001
            code: 0
            code_msg: ok
            message_id: 1001
            conversation_round_id: 201

    error:
      summary: 错误消息
      description: 服务端返回错误信息
      message:
        type: object
        properties:
          type:
            type: string
            enum: [error]
          ts:
            type: integer
            format: int64
          payload:
            allOf:
              - $ref: '#/components/schemas/WSPayload'
              - type: object
                properties:
                  code:
                    type: integer
                    description: 错误码
                  code_msg:
                    type: string
                    description: 错误描述
        example:
          type: error
          ts: 1748352000000
          payload:
            ts: 1748352000000
            world_id: world_123
            location_id: location_001
            session_id: session_abc123
            user_id: user_001
            code: 1005
            code_msg: 未加入聊天室

    # ---------- 世界事件 ----------
    input_blocked:
      summary: 输入阻止
      description: 世界正在推进中，暂时阻止用户输入
      message:
        type: object
        properties:
          type:
            type: string
            enum: [input_blocked]
          payload:
            $ref: '#/components/schemas/WSPayload'

    input_ready:
      summary: 输入就绪
      description: 世界推进完成，用户可以继续输入
      message:
        type: object
        properties:
          type:
            type: string
            enum: [input_ready]
          payload:
            $ref: '#/components/schemas/WSPayload'

    world_notification:
      summary: 世界消息通知
      description: 世界级事件通知，广播给世界内所有用户
      message:
        type: object
        properties:
          type:
            type: string
            enum: [world_notification]
          ts:
            type: integer
            format: int64
          world_payload:
            $ref: '#/components/schemas/WorldNotificationPayload'
          broadcast:
            type: boolean
            description: 是否为广播消息
        example:
          type: world_notification
          ts: 1748352000000
          world_payload:
            ts: 1748352000000
            world_id: world_123
            event_type: weather_change
            title: 天气变化
            summary: 天空下起了小雨...
            detail_url: /api/v1/world/world_123/events/weather
          broadcast: true

    # ---------- 聊天消息 ----------
    user_message:
      summary: 用户消息广播
      description: 广播用户发送的消息给聊天室内所有用户
      message:
        type: object
        properties:
          type:
            type: string
            enum: [user_message]
          ts:
            type: integer
            format: int64
          payload:
            allOf:
              - $ref: '#/components/schemas/WSPayload'
              - type: object
                properties:
                  message_id:
                    type: integer
                    format: int64
                  conversation_round_id:
                    type: integer
                    format: int64
                  round_order:
                    type: integer
                  sender_type:
                    type: string
                    enum: [user]
                  sender_id:
                    type: string
                  sender_name:
                    type: string
                  content:
                    type: string
          broadcast:
            type: boolean
        example:
          type: user_message
          ts: 1748352000000
          payload:
            ts: 1748352000000
            world_id: world_123
            location_id: location_001
            session_id: session_abc123
            user_id: user_001
            code: 0
            code_msg: ok
            message_id: 1001
            conversation_round_id: 201
            round_order: 0
            sender_type: user
            sender_id: sender_001
            sender_name: 玩家小明
            content: 你好，今天天气怎么样？
          broadcast: true

    character_message:
      summary: 角色消息广播
      description: AI 角色的回复消息
      message:
        type: object
        properties:
          type:
            type: string
            enum: [character_message]
          ts:
            type: integer
            format: int64
          payload:
            allOf:
              - $ref: '#/components/schemas/WSPayload'
              - type: object
                properties:
                  message_id:
                    type: integer
                    format: int64
                  conversation_round_id:
                    type: integer
                    format: int64
                  round_order:
                    type: integer
                  sender_type:
                    type: string
                    enum: [character]
                  sender_id:
                    type: string
                    description: 角色ID
                  sender_name:
                    type: string
                    description: 角色名称
                  content:
                    type: string
          broadcast:
            type: boolean
        example:
          type: character_message
          ts: 1748352000000
          payload:
            ts: 1748352000000
            world_id: world_123
            location_id: location_001
            session_id: ""
            user_id: ""
            code: 0
            code_msg: ok
            message_id: 1002
            conversation_round_id: 201
            round_order: 1
            sender_type: character
            sender_id: char_alice
            sender_name: Alice
            content: "*温柔一笑* 今天天气真好呢，阳光明媚的~"
          broadcast: true

    narrator_message:
      summary: 旁白消息广播
      description: 系统旁白消息
      message:
        type: object
        properties:
          type:
            type: string
            enum: [narrator_message]
          ts:
            type: integer
            format: int64
          payload:
            allOf:
              - $ref: '#/components/schemas/WSPayload'
              - type: object
                properties:
                  message_id:
                    type: integer
                    format: int64
                  conversation_round_id:
                    type: integer
                    format: int64
                  round_order:
                    type: integer
                  sender_type:
                    type: string
                    enum: [narrator]
                  content:
                    type: string
          broadcast:
            type: boolean
        example:
          type: narrator_message
          ts: 1748352000000
          payload:
            ts: 1748352000000
            world_id: world_123
            location_id: location_001
            session_id: ""
            user_id: ""
            code: 0
            code_msg: ok
            message_id: 1003
            conversation_round_id: 201
            round_order: 2
            sender_type: narrator
            content: 小镇广场上，阳光洒在石板路上...
          broadcast: true

    # ---------- AI 流式 ----------
    ai_stream_start:
      summary: AI 流开始
      description: AI 开始流式输出
      message:
        type: object
        properties:
          type:
            type: string
            enum: [ai_stream_start]
          payload:
            type: object
            properties:
              conversation_round_id:
                type: integer
                format: int64

    ai_stream_chunk:
      summary: AI 流内容块
      description: AI 流式输出的内容块
      message:
        type: object
        properties:
          type:
            type: string
            enum: [ai_stream_chunk]
          payload:
            type: object
            properties:
              chunk:
                type: string
                description: 增量内容

    ai_stream_end:
      summary: AI 流结束
      description: AI 流式输出结束
      message:
        type: object
        properties:
          type:
            type: string
            enum: [ai_stream_end]
          payload:
            type: object
            properties:
              message_id:
                type: integer
                format: int64

components:
  schemas:
    # ==================== 通用结构 ====================
    WSMessage:
      type: object
      description: WebSocket 消息统一结构
      required:
        - type
      properties:
        type:
          type: string
          description: 消息类型
          enum:
            # 客户端发送
            - join
            - send_message
            - heartbeat
            - leave
            # 服务端发送
            - joined
            - leaved
            - kicked
            - disconnected
            - ack
            - error
            - input_blocked
            - input_ready
            - world_notification
            - user_message
            - character_message
            - narrator_message
            - ai_stream_start
            - ai_stream_chunk
            - ai_stream_end
        ts:
          type: integer
          format: int64
          description: 时间戳（毫秒）
        payload:
          type: object
          description: 消息载荷
        world_payload:
          type: object
          description: 世界消息通知载荷（仅 world_notification 类型）
        broadcast:
          type: boolean
          description: 是否为广播消息

    WSPayload:
      type: object
      description: 服务端发送的通用载荷结构
      properties:
        ts:
          type: integer
          format: int64
          description: 消息时间戳（毫秒）
        world_id:
          type: string
          description: 世界实例ID
        location_id:
          type: string
          description: 聊天室ID
        session_id:
          type: string
          description: 会话ID
        user_id:
          type: string
          description: 用户ID
        code:
          type: integer
          description: 状态码（0=成功，非0=错误）
        code_msg:
          type: string
          description: 状态/错误描述
        message_id:
          type: integer
          format: int64
          description: 消息ID
        conversation_round_id:
          type: integer
          format: int64
          description: 对话轮次ID
        round_order:
          type: integer
          description: 轮次内消息序号
        content:
          type: string
          description: 消息内容
        sender_type:
          type: string
          description: 发送者类型
          enum: [user, character, narrator]
        sender_id:
          type: string
          description: 发送者ID
        sender_name:
          type: string
          description: 发送者名称
        chunk:
          type: string
          description: AI 流式增量内容
        message:
          type: string
          description: 用户提示文本

    WorldNotificationPayload:
      type: object
      description: 世界消息通知载荷
      properties:
        ts:
          type: integer
          format: int64
          description: 消息时间戳（毫秒）
        world_id:
          type: string
          description: 世界实例ID
        event_type:
          type: string
          description: 事件类型
          enum:
            - weather_change
            - location_unlock
            - story_progress
            - character_event
            - system_notice
        title:
          type: string
          description: 标题
        summary:
          type: string
          description: 摘要
        detail_url:
          type: string
          description: 详情链接

    WSClientPayload:
      type: object
      description: 客户端发送的消息载荷
      properties:
        location_id:
          type: string
          description: 地点ID（join/leave）
        text:
          type: string
          description: 消息内容（send_message）
        client_uuid:
          type: string
          description: 客户端消息UUID（send_message 幂等去重）

  # ==================== 错误码 ====================
  x-error-codes:
    websocket-errors:
      category: WebSocket 错误 (1xxx)
      codes:
        - code: 1001
          message: 参数错误
          description: 请求参数不正确
        - code: 1002
          message: 消息格式错误
          description: WebSocket 消息 JSON 格式不正确
        - code: 1003
          message: 未知消息类型
          description: 发送了不支持的消息类型
        - code: 1004
          message: 已加入聊天室
          description: 用户已经在当前聊天室中
        - code: 1005
          message: 未加入聊天室
          description: 用户未加入聊天室，无法发送消息
        - code: 1006
          message: join 消息格式错误
          description: join 消息的 payload 格式不正确
        - code: 1007
          message: user_id、sender_id、sender_name 必填
          description: 缺少必填的用户信息
        - code: 1008
          message: send_message 消息格式错误
          description: send_message 消息的 payload 格式不正确
        - code: 1009
          message: text 必填
          description: 发送消息时缺少 text 字段
        - code: 1010
          message: 地点已满
          description: 当前地点人数已达上限
        - code: 1011
          message: 会话不存在
          description: Session 不存在或已过期
        - code: 1012
          message: 未建立连接
          description: WebSocket 连接未建立
        - code: 1013
          message: location_id 必填
          description: join 消息缺少 location_id

    business-errors:
      category: 业务逻辑错误 (2xxx)
      codes:
        - code: 2001
          message: 创建会话失败
          description: 创建 Session 时发生错误
        - code: 2002
          message: 生成消息ID失败
          description: Redis INCR 生成消息ID失败
        - code: 2003
          message: 生成轮次ID失败
          description: Redis INCR 生成轮次ID失败
        - code: 2004
          message: 保存消息失败
          description: 消息持久化到 MySQL 失败
        - code: 2005
          message: 队列已满
          description: 消息队列已达上限，请稍后重试
        - code: 2006
          message: 世界正在推进中
          description: Tick 锁定中，请稍候
        - code: 2007
          message: AI 服务暂时不可用
          description: LLM 调用失败
        - code: 2008
          message: 开场白生成失败
          description: 生成开场白时发生错误
        - code: 2009
          message: Tick 已被锁定
          description: 世界正在推进中，请稍候
        - code: 2010
          message: 消息发送过于频繁
          description: 用户消息频次限制（10秒内只能发送一条）

    internal-errors:
      category: 内部错误 (5xxx)
      codes:
        - code: 5000
          message: 服务暂时不可用
          description: 内部服务错误
        - code: 5001
          message: 服务暂时不可用
          description: Redis 操作错误
        - code: 5002
          message: 服务暂时不可用
          description: MySQL 操作错误
        - code: 5003
          message: 服务暂时不可用
          description: 外部服务调用错误

    auth-errors:
      category: 认证错误 (100xx)
      codes:
        - code: 10001
          message: 未授权
          description: 请先登录

tags:
  - name: WebSocket
    description: WebSocket 实时通信接口
