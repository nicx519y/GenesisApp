<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Location Chat Debug</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2/cdn/themes/dark.css">
    <link rel="stylesheet" href="/styles.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2/cdn/shoelace-autoloader.js"></script>
  </head>
  <body class="sl-theme-dark">
    <header class="topbar">
      <div class="brand-block">
        <h1>Location Chat Debug</h1>
        <p id="connectionStatus">Waiting for agent_control...</p>
      </div>
      <section class="control-row">
        <section class="agent-strip">
          <div class="agent-title">
            <h2>Agent Control</h2>
            <span id="agentStatus" class="agent-status-badge" data-status="idle">idle</span>
          </div>
          <label class="agent-field">
            <span>Count</span>
            <input id="agentCountInput" type="number" min="1" max="1000" value="20">
          </label>
          <label class="agent-field">
            <span>Locations</span>
            <input id="agentLocationCountInput" type="number" min="1" max="100" value="1">
          </label>
          <label class="agent-field agent-wid-field">
            <span>Wid</span>
            <input id="agentWidInput" type="text" autocomplete="off" spellcheck="false" placeholder="Current or wid">
          </label>
          <label class="agent-check">
            <input id="agentUseCurrentTarget" type="checkbox" checked>
            <span>Use current location</span>
          </label>
          <div class="agent-actions">
            <sl-button id="agentStartButton" size="small" variant="primary">Start Agent</sl-button>
            <sl-button id="agentStopButton" size="small" variant="danger" disabled>Stop Agent</sl-button>
          </div>
        </section>

        <section class="tools-strip">
          <h2>Tools</h2>
          <div class="actions">
            <sl-button id="refreshButton" size="small" variant="default">Refresh</sl-button>
            <sl-button id="clearButton" size="small" variant="default">Clear Events</sl-button>
            <sl-button id="exportButton" size="small" variant="primary">Export JSON</sl-button>
          </div>
        </section>
      </section>
    </header>

    <main class="app-shell">
      <section class="info-strip">
        <div id="summaryGrid" class="info-grid"></div>
      </section>

      <section class="workspace split-workspace">
        <sl-card class="work-card queue-card">
          <sl-tab-group id="queueMainTabGroup" class="queue-main-tab-group">
            <sl-tab slot="nav" panel="queueCompare">Queue Compare</sl-tab>
            <sl-tab slot="nav" panel="errors">Errors</sl-tab>
            <sl-tab-panel name="queueCompare">
              <sl-tab-group id="locationTabGroup" class="location-tab-group"></sl-tab-group>
            </sl-tab-panel>
            <sl-tab-panel name="errors">
              <div id="queueErrors" class="panel-scroll errors-scroll"></div>
            </sl-tab-panel>
          </sl-tab-group>
          <section id="manualSendPanel" class="manual-send-panel" data-state="disabled">
            <div class="manual-send-meta">
              <span id="manualSendTarget">Target: -</span>
              <span id="manualSendStatus">Waiting for snapshot</span>
            </div>
            <form id="manualSendForm" class="manual-send-form" autocomplete="off">
              <input
                id="manualSendInput"
                type="text"
                spellcheck="false"
                placeholder="Send message to current location"
              >
              <sl-button id="manualSendButton" type="submit" size="small" variant="primary" disabled>Send</sl-button>
            </form>
          </section>
        </sl-card>

        <sl-card class="work-card network-card">
          <div slot="header" class="panel-heading">
            <h2>Net Work</h2>
          </div>
          <sl-tab-group id="networkTabGroup" class="network-tab-group">
            <sl-tab slot="nav" panel="http">HTTPS</sl-tab>
            <sl-tab slot="nav" panel="websocket">WebSocket</sl-tab>
            <sl-tab-panel name="http">
              <div id="httpMessages" class="panel-scroll"></div>
            </sl-tab-panel>
            <sl-tab-panel name="websocket">
              <div id="websocketFrames" class="panel-scroll"></div>
            </sl-tab-panel>
          </sl-tab-group>
        </sl-card>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
